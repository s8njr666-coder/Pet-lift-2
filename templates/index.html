<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetLift</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif;
           background: #2ABFB3; color: #0D2E2C; }
    .wrap { max-width: 420px; margin: 0 auto; padding: 3rem 1.5rem; }
    .title { font-size: 2rem; font-weight: 900; color: white; margin-bottom: 0.25rem; }
    .sub { color: rgba(255,255,255,0.75); margin-bottom: 2.5rem; font-size: 1rem; }
    .btn {
      display: block; width: 100%; padding: 1rem;
      margin-bottom: 0.75rem; border-radius: 999px;
      text-align: center; text-decoration: none;
      font-size: 1rem; font-weight: 800; border: none; cursor: pointer;
    }
    .orange { background: #FF7940; color: #0D2E2C; }
    .white { background: white; color: #0D2E2C; border: 2px solid white; }
    .note { text-align: center; color: rgba(255,255,255,0.5);
            font-size: 0.8rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">🐾 PetLift</div>
    <div class="sub">Community rides for rescue pets in Phoenix.</div>
    <a class="btn orange" href="/rescuer">I Need a Ride<br>
      <span style="font-weight:500;font-size:0.85rem">Rescuer / Colony Manager</span>
    </a>
    <a class="btn white" href="/driver">I Can Drive<br>
      <span style="font-weight:500;font-size:0.85rem">Volunteer</span>
    </a>
    <p class="note">Volunteer drivers only · No passenger rides</p>
  </div>
</body>
</html>
